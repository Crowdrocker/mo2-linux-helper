name: Build & Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Test ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint JS/JSX
        run: npm run lint

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust format check
        run: cd src-tauri && cargo fmt --check

      - name: Rust clippy
        run: cd src-tauri && cargo clippy -- -D warnings

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'

  # ── Build Linux ─────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux (${{ matrix.target }})
    needs: lint
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target: [appimage, deb]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install JS dependencies
        run: npm ci

      - name: Build Tauri (${{ matrix.target }})
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          args: --bundles ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mo2-linux-helper-${{ matrix.target }}
          path: |
            src-tauri/target/release/bundle/${{ matrix.target }}/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          retention-days: 7

  # ── Release ─────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: build-linux
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: mo2-linux-helper-appimage
          path: ./dist

      - name: Download deb artifact
        uses: actions/download-artifact@v4
        with:
          name: mo2-linux-helper-deb
          path: ./dist

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          cat > release_notes.md << EOF
          ## MO2 Linux Helper v${VERSION}

          ### Installation

          **AUR (Arch Linux):**
          \`\`\`bash
          yay -S mo2-linux-helper
          \`\`\`

          **AppImage:**
          \`\`\`bash
          chmod +x mo2-linux-helper_${VERSION}_amd64.AppImage
          ./mo2-linux-helper_${VERSION}_amd64.AppImage
          \`\`\`

          **Debian/Ubuntu (.deb):**
          \`\`\`bash
          sudo dpkg -i mo2-linux-helper_${VERSION}_amd64.deb
          \`\`\`

          ### Changes
          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "MO2 Linux Helper v${{ steps.notes.outputs.version }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.AppImage.tar.gz
            dist/**/*.AppImage.tar.gz.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update AUR package
        if: "!contains(github.ref, 'alpha') && !contains(github.ref, 'beta')"
        run: |
          echo "TODO: Add AUR publish step using SSH key secret"
          echo "See: https://github.com/KSXGitHub/github-actions-deploy-aur"
