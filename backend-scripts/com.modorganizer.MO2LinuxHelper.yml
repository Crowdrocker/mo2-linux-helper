app-id: com.modorganizer.MO2LinuxHelper
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: mo2-helper

finish-args:
  --filesystem=host
  --filesystem=home
  --device=all
  --socket=x11
  --socket=wayland
  --socket=pulseaudio
  --share=network
  --share=ipc
  --talk-name=org.freedesktop.Notifications
  --talk-name=com.valvesoftware.Steam

modules:
  - name: mo2-helper
    buildsystem: simple
    build-commands:
      - install -Dm755 mo2-helper /app/bin/mo2-helper
      - install -Dm644 mo2-helper.png /app/share/icons/hicolor/256x256/apps/com.modorganizer.MO2LinuxHelper.png
      - install -Dm644 com.modorganizer.MO2LinuxHelper.desktop /app/share/applications/com.modorganizer.MO2LinuxHelper.desktop
      - install -Dm644 com.modorganizer.MO2LinuxHelper.metainfo.xml /app/share/metainfo/com.modorganizer.MO2LinuxHelper.metainfo.xml
    sources:
      - type: file
        path: mo2-helper
      - type: file
        path: mo2-helper.png
      - type: file
        path: com.modorganizer.MO2LinuxHelper.desktop
      - type: file
        path: com.modorganizer.MO2LinuxHelper.metainfo.xml